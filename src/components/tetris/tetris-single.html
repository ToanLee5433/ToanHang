<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Single Player - Game cho Hằng xinh gái ❤️</title>
    <meta name="description" content="Chơi Tetris đơn với giao diện đẹp mắt và nhiều tính năng thú vị.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../../css/main.css?v=1.0.3">
    
    <style>
        :root {
            --primary-color: #ff3385; /* Sweet Pink */
            --secondary-color: #d633ff; /* Pastel Purple */
            --accent-color: #ff5c93; /* Warm Rose */
            --success-color: #28a745; 
            --danger-color: #dc3545; 
            --warning-color: #ffc107; 
            --dark-bg: #fff5f8;
            --card-bg: rgba(255, 255, 255, 0.85); /* Glassmorphic white-pink card */
            --border-glow: rgba(255, 51, 133, 0.25);
            --shadow-glow: rgba(255, 51, 133, 0.15);
            --shadow-heavy: rgba(255, 102, 163, 0.12);
            --gradient-primary: linear-gradient(135deg, #ff3385, #d633ff);
            --gradient-cyan: linear-gradient(135deg, #ff5c93, #e0aaff);
            --gradient-warning: linear-gradient(135deg, #ffd3b6, #ff8c00);
            --gradient-success: linear-gradient(135deg, #a8ffb2, #28a745);
            --gradient-danger: linear-gradient(135deg, #ff9ebe, #dc3545);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #fff5f8 0%, #ffe3ec 50%, #ffc2d9 100%) !important;
            min-height: 100vh !important;
            font-family: 'Roboto', sans-serif;
            color: #4a0e2e !important; /* Berry color instead of white */
            overflow-x: hidden !important;
            overflow-y: auto !important;
            position: relative;
            display: flex !important;
            flex-direction: column !important;
            height: auto !important;
        }

        /* Header Styling */
        .game-header {
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border-bottom: 2px solid rgba(255, 51, 133, 0.3) !important;
            padding: 0.75rem 0 !important;
            position: sticky !important;
            top: 0 !important;
            z-index: 100 !important;
            box-shadow: 0 8px 32px rgba(255, 102, 163, 0.15) !important;
            width: 100% !important;
            height: auto !important;
            display: block !important;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .game-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 15px rgba(184, 41, 255, 0.4);
            margin: 0;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 5px rgba(184, 41, 255, 0.4)); }
            to { filter: drop-shadow(0 0 15px rgba(255, 41, 184, 0.7)); }
        }

        .game-mode {
            font-size: clamp(0.8rem, 1.8vw, 0.95rem);
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
            text-shadow: 0 0 10px rgba(0, 240, 240, 0.4);
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.04);
            color: #e0e0e0;
            border: 1px solid rgba(184, 41, 255, 0.3);
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header-btn:hover {
            background: rgba(184, 41, 255, 0.12);
            border-color: rgba(184, 41, 255, 0.7);
            color: #ffffff;
            box-shadow: 0 0 15px rgba(184, 41, 255, 0.4);
            transform: translateY(-2px);
        }

        .header-btn.danger {
            border-color: rgba(255, 10, 84, 0.3);
        }
        .header-btn.danger:hover {
            background: rgba(255, 10, 84, 0.12);
            border-color: rgba(255, 10, 84, 0.7);
            box-shadow: 0 0 15px rgba(255, 10, 84, 0.4);
        }

        /* Main Game Container */
        .game-container {
            max-width: 1400px !important;
            margin: 0 auto !important;
            padding: 30px 20px !important;
            min-height: calc(100vh - 80px) !important;
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
            align-items: flex-start !important;
            gap: 2.5rem !important;
            width: 100% !important;
            height: auto !important;
            box-sizing: border-box !important;
        }

        /* Sidebars Glassmorphism */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 200px;
        }

        .piece-display {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(184, 41, 255, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 30px var(--shadow-heavy), 
                        inset 0 0 15px rgba(184, 41, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .piece-display:hover {
            transform: translateY(-4px);
            border-color: rgba(184, 41, 255, 0.5);
            box-shadow: 0 15px 40px rgba(184, 41, 255, 0.25), 
                        inset 0 0 20px rgba(184, 41, 255, 0.1);
        }

        .piece-title {
            font-size: 0.9rem;
            font-weight: 700;
            color: #4a0e2e;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .piece-canvas {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            background: #090514;
            width: 120px;
            height: 120px;
            margin: 0 auto;
            display: block;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        /* Center Game Board */
        .game-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.8rem;
        }

        /* Futuristic Cyber Stats Dashboard */
        .game-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #f8f9fa;
            padding: 0.75rem 1.25rem;
            border-radius: 14px;
            font-weight: 600;
            min-width: 110px;
            text-align: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(184, 41, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 41, 255, 0.15);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #a0a5c0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 0.2rem;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
            font-family: 'Roboto', sans-serif;
            display: inline-block;
        }

        /* Custom gorgeous gradients for each stat */
        #score {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #level {
            background: linear-gradient(135deg, #b829ff, #ff29b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #lines {
            background: linear-gradient(135deg, #00f0f0, #007bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #time {
            background: linear-gradient(135deg, #ff3366, #ff7b00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #combo {
            background: linear-gradient(135deg, #10ff10, #00f0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Game Board Box with Pink Neon Glow */
        .game-board-container {
            position: relative;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 51, 133, 0.3);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: 0 20px 50px rgba(255, 102, 163, 0.15), 
                        0 0 30px rgba(255, 51, 133, 0.15),
                        inset 0 0 25px rgba(255, 51, 133, 0.05);
            transition: all 0.3s ease;
        }

        .game-board-container:hover {
            border-color: rgba(255, 51, 133, 0.6);
            box-shadow: 0 25px 60px rgba(255, 102, 163, 0.25), 
                        0 0 40px rgba(255, 51, 133, 0.25),
                        inset 0 0 30px rgba(255, 51, 133, 0.1);
            transform: scale(1.005);
        }

        #game-canvas {
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            background: #090514;
            display: block;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
            max-width: 100%;
            height: auto;
            aspect-ratio: 1/2;
        }

        /* Right Sidebar - Controls & Buttons */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 260px;
        }

        .controls-section {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(184, 41, 255, 0.2);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px var(--shadow-heavy),
                        inset 0 0 15px rgba(184, 41, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .controls-section:hover {
            transform: translateY(-4px);
            border-color: rgba(184, 41, 255, 0.5);
            box-shadow: 0 15px 40px rgba(184, 41, 255, 0.25),
                        inset 0 0 20px rgba(184, 41, 255, 0.1);
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #4a0e2e;
            margin-bottom: 1.2rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .controls-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 12px;
            border: 1px solid rgba(255, 51, 133, 0.1);
            transition: all 0.3s ease;
        }

        .control-item:hover {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 51, 133, 0.3);
            transform: translateX(4px);
            box-shadow: 0 2px 10px rgba(255, 102, 163, 0.1);
        }

        .key {
            background: rgba(255, 255, 255, 0.7);
            color: #ff3385;
            border: 1px solid rgba(255, 51, 133, 0.3);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 45px;
            text-align: center;
            box-shadow: 0 0 10px rgba(255, 102, 163, 0.1);
        }

        .action {
            font-weight: 500;
            color: #663354;
            font-size: 0.85rem;
        }

        /* Cyberpunk Button Gradients */
        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .control-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            box-shadow: 0 6px 20px rgba(184, 41, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(184, 41, 255, 0.45);
        }

        .control-btn.danger {
            background: var(--gradient-danger);
            box-shadow: 0 6px 20px rgba(255, 10, 84, 0.2);
        }
        .control-btn.danger:hover {
            box-shadow: 0 8px 25px rgba(255, 10, 84, 0.45);
        }

        .control-btn.warning {
            background: var(--gradient-warning);
            box-shadow: 0 6px 20px rgba(255, 140, 0, 0.2);
        }
        .control-btn.warning:hover {
            box-shadow: 0 8px 25px rgba(255, 140, 0, 0.45);
        }

        /* Modals Glassmorphism Overlays */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(4, 2, 9, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .modal.hidden {
            display: none !important;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(255, 51, 133, 0.4);
            border-radius: 28px;
            padding: 2.5rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 60px rgba(255, 102, 163, 0.2), 
                        0 0 40px rgba(255, 51, 133, 0.15);
            position: relative;
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: #4a0e2e;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 0 0 20px rgba(184, 41, 255, 0.3);
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1.2rem;
            margin: 1.5rem 0;
        }

        .modal-stat {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1.2rem;
            border-radius: 18px;
            text-align: center;
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.02);
        }

        .modal-stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            display: block;
            margin-bottom: 0.3rem;
            background: var(--gradient-warning);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        /* Modal stats customized colors */
        .modal-stat:nth-child(2) .modal-stat-value {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-stat:nth-child(3) .modal-stat-value {
            background: var(--gradient-cyan);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .modal-stat:nth-child(4) .modal-stat-value {
            background: var(--gradient-danger);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-stat-label {
            font-size: 0.85rem;
            color: #a0a5c0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .modal-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 130px;
            font-size: 1rem;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .modal-btn.primary {
            background: var(--gradient-success);
            box-shadow: 0 5px 15px rgba(16, 255, 16, 0.2);
        }
        .modal-btn.primary:hover {
            box-shadow: 0 8px 25px rgba(16, 255, 16, 0.45);
        }

        .modal-btn.secondary {
            background: var(--gradient-cyan);
            box-shadow: 0 5px 15px rgba(0, 240, 240, 0.2);
        }
        .modal-btn.secondary:hover {
            box-shadow: 0 8px 25px rgba(0, 240, 240, 0.45);
        }

        .modal-btn.danger {
            background: var(--gradient-danger);
            box-shadow: 0 5px 15px rgba(255, 10, 84, 0.2);
        }
        .modal-btn.danger:hover {
            box-shadow: 0 8px 25px rgba(255, 10, 84, 0.45);
        }

        .modal-btn:hover {
            transform: translateY(-2px);
        }

        /* Responsiveness Overrides to support all viewports cleanly */
        @media (max-width: 1200px) {
            .game-container {
                flex-direction: column !important;
                align-items: center !important;
                padding: 20px 10px !important;
            }

            .left-sidebar, .right-sidebar {
                flex-direction: row !important;
                min-width: auto !important;
                width: 100% !important;
                max-width: 600px !important;
                justify-content: center !important;
            }

            .piece-display, .controls-section {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column !important;
                text-align: center !important;
            }

            .game-stats {
                justify-content: center !important;
            }

            .stat-item {
                min-width: 90px !important;
                padding: 0.6rem 0.8rem !important;
            }

            .left-sidebar, .right-sidebar {
                flex-direction: column !important;
                align-items: center !important;
            }
            
            .piece-display, .controls-section {
                width: 100% !important;
                max-width: 400px !important;
            }

            .game-board-container {
                padding: 1rem !important;
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 10px 5px !important;
            }

            .game-board-container {
                padding: 0.5rem !important;
                border-radius: 16px !important;
            }

            .piece-display, .controls-section {
                padding: 1rem !important;
            }

            .game-title {
                font-size: 1.1rem !important;
            }

            .stat-item {
                min-width: 80px !important;
                padding: 0.5rem 0.6rem !important;
            }

            .stat-value {
                font-size: 1.1rem !important;
            }
            
            .modal-content {
                padding: 1.5rem !important;
            }
            
            .modal-title {
                font-size: 1.4rem !important;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="game-header">
        <div class="header-content">
            <div>
                <h1 class="game-title">🧩 TETRIS 🧩</h1>
                <div class="game-mode" id="game-mode">Chế Độ Cổ Điển</div>
            </div>
            <div class="header-controls">
                <button class="header-btn" id="pause-btn">⏸️ Tạm Dừng</button>
                <button class="header-btn" id="settings-btn">⚙️ Cài Đặt</button>
                <button class="header-btn danger" id="quit-btn">❌ Thoát</button>
            </div>
        </div>
    </header>

    <!-- Main Game Container -->
    <main class="game-container">
        <!-- Left Sidebar - Next & Hold Pieces -->
        <aside class="left-sidebar">
            <div class="piece-display">
                <div class="piece-title">Tiếp Theo</div>
                <canvas id="next-canvas" class="piece-canvas" width="120" height="120"></canvas>
            </div>
            
            <div class="piece-display">
                <div class="piece-title">Giữ Khối</div>
                <canvas id="hold-canvas" class="piece-canvas" width="120" height="120"></canvas>
            </div>
        </aside>

        <!-- Center - Game Board -->
        <section class="game-center">
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">Điểm</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cấp</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Hàng</span>
                    <span class="stat-value" id="lines">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Thời Gian</span>
                    <span class="stat-value" id="time">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Combo</span>
                    <span class="stat-value" id="combo">0</span>
                </div>
            </div>
            
            <div class="game-board-container">
                <canvas id="game-canvas" width="300" height="600"></canvas>
            </div>
        </section>

        <!-- Right Sidebar - Controls & Instructions -->
        <aside class="right-sidebar">
            <div class="controls-section">
                <h3 class="section-title">Điều Khiển</h3>
                <div class="controls-list">
                    <div class="control-item">
                        <span class="key">← →</span>
                        <span class="action">Di chuyển</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span>
                        <span class="action">Rơi nhanh</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↑</span>
                        <span class="action">Xoay</span>
                    </div>
                    <div class="control-item">
                        <span class="key">Space</span>
                        <span class="action">Hard Drop</span>
                    </div>
                    <div class="control-item">
                        <span class="key">C</span>
                        <span class="action">Giữ khối</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span class="action">Tạm dừng</span>
                    </div>
                </div>
            </div>

            <div class="controls-section">
                <h3 class="section-title">Điều Khiển Game</h3>
                <div class="game-controls">
                    <button class="control-btn" id="pause-game-btn">⏸️ Tạm Dừng</button>
                    <button class="control-btn warning" id="restart-btn">🔄 Chơi Lại</button>
                    <button class="control-btn danger" id="quit-game-btn">❌ Thoát Game</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Modals -->
    <div id="pause-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">⏸️ Tạm Dừng</h2>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="resume-btn">Tiếp Tục</button>
                <button class="modal-btn secondary" id="restart-modal-btn">Chơi Lại</button>
                <button class="modal-btn danger" id="quit-modal-btn">Thoát</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">🎮 Game Over</h2>
            <div class="modal-stats">
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-score">0</span>
                    <span class="modal-stat-label">Điểm</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-level">1</span>
                    <span class="modal-stat-label">Cấp</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-lines">0</span>
                    <span class="modal-stat-label">Hàng</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-time">00:00</span>
                    <span class="modal-stat-label">Thời Gian</span>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="play-again-btn">Chơi Lại</button>
                <button class="modal-btn secondary" id="back-to-menu-btn">Về Menu</button>
            </div>
        </div>
    </div>

               <!-- Game Scripts -->
           <script type="module" src="tetris-game-logic.js"></script>
</body>
</html>
