<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Single Player - Game cho Hằng xinh gái ❤️</title>
    <meta name="description" content="Chơi Tetris đơn với giao diện đẹp mắt và nhiều tính năng thú vị.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="../../css/main.css">
    
    <style>
        :root {
            --primary-color: #6f42c1;
            --secondary-color: #e83e8c;
            --accent-color: #fd7e14;
            --success-color: #28a745;
            --danger-color: #dc3545;
            --warning-color: #ffc107;
            --info-color: #17a2b8;
            --dark-color: #343a40;
            --light-color: #f8f9fa;
            --white-color: #ffffff;
            --shadow-light: rgba(0,0,0,0.1);
            --shadow-medium: rgba(0,0,0,0.2);
            --shadow-heavy: rgba(0,0,0,0.3);
            --gradient-primary: linear-gradient(135deg, #6f42c1, #e83e8c);
            --gradient-secondary: linear-gradient(135deg, #fd7e14, #ffc107);
            --gradient-success: linear-gradient(135deg, #28a745, #20c997);
            --gradient-danger: linear-gradient(135deg, #dc3545, #fd7e14);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
            color: var(--dark-color);
            overflow-x: hidden;
            position: relative;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            25% { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
            50% { background: linear-gradient(135deg, #e83e8c 0%, #6f42c1 100%); }
            75% { background: linear-gradient(135deg, #6f42c1 0%, #e83e8c 100%); }
        }

        /* Header */
        .game-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 3px solid var(--primary-color);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px var(--shadow-medium);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .game-title {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 3px 3px 6px var(--shadow-medium);
            margin: 0;
            animation: titleGlow 2s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            from { filter: drop-shadow(0 0 5px rgba(111, 66, 193, 0.5)); }
            to { filter: drop-shadow(0 0 15px rgba(232, 62, 140, 0.8)); }
        }

        .game-mode {
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .header-controls {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .header-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: clamp(0.8rem, 1.5vw, 0.9rem);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--shadow-medium);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
        }

        .header-btn.danger {
            background: var(--gradient-danger);
        }

        /* Main Game Container */
        .game-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: calc(100vh - 100px);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 2rem;
        }

        /* Left Sidebar - Next & Hold Pieces */
        .left-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 180px;
        }

        .piece-display {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 10px 30px var(--shadow-medium);
            transition: all 0.3s ease;
        }

        .piece-display:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-heavy);
        }

        .piece-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .piece-canvas {
            border: 2px solid var(--primary-color);
            border-radius: 15px;
            background: var(--light-color);
            width: 120px;
            height: 120px;
            margin: 0 auto;
            display: block;
            box-shadow: inset 0 0 10px var(--shadow-light);
        }

        /* Center Game Board */
        .game-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .game-stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-item {
            background: var(--gradient-secondary);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            font-weight: 600;
            min-width: 120px;
            text-align: center;
            box-shadow: 0 6px 20px var(--shadow-medium);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .stat-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.9;
            display: block;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .game-board-container {
            position: relative;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 4px solid var(--primary-color);
            border-radius: 25px;
            padding: 2rem;
            box-shadow: 0 15px 35px var(--shadow-heavy), inset 0 0 20px rgba(111, 66, 193, 0.1);
            transition: all 0.3s ease;
        }

        .game-board-container:hover {
            box-shadow: 0 20px 45px var(--shadow-heavy), inset 0 0 25px rgba(111, 66, 193, 0.2);
            transform: scale(1.01);
        }

        #game-canvas {
            border: 3px solid var(--primary-color);
            border-radius: 15px;
            background: var(--light-color);
            display: block;
            box-shadow: inset 0 0 15px var(--shadow-light);
            max-width: 100%;
            height: auto;
            aspect-ratio: 1/2;
        }

        /* Right Sidebar - Controls & Instructions */
        .right-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 250px;
        }

        .controls-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 3px solid var(--info-color);
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px var(--shadow-medium);
            transition: all 0.3s ease;
        }

        .controls-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-heavy);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--info-color);
            margin-bottom: 1rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-list {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .control-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem;
            background: var(--light-color);
            border-radius: 10px;
            border: 1px solid var(--info-color);
            transition: all 0.3s ease;
        }

        .control-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 15px var(--shadow-medium);
        }

        .key {
            background: var(--info-color);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.8rem;
            min-width: 40px;
            text-align: center;
        }

        .action {
            font-weight: 500;
            color: var(--dark-color);
            font-size: 0.9rem;
        }

        /* Game Controls */
        .game-controls {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .control-btn {
            background: var(--gradient-primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px var(--shadow-medium);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
        }

        .control-btn.danger {
            background: var(--gradient-danger);
        }

        .control-btn.warning {
            background: var(--gradient-secondary);
        }

        /* Modals */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(5px);
        }

        .modal.hidden {
            display: none;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border: 3px solid var(--primary-color);
            border-radius: 25px;
            padding: 2.5rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px var(--shadow-heavy);
            position: relative;
            animation: modalSlideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-family: 'Press Start 2P', monospace;
        }

        .modal-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .modal-stat {
            background: var(--gradient-secondary);
            color: white;
            padding: 1.2rem;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 6px 20px var(--shadow-medium);
        }

        .modal-stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            display: block;
            margin-bottom: 0.3rem;
        }

        .modal-stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
            font-size: 1rem;
        }

        .modal-btn.primary {
            background: var(--gradient-success);
            color: white;
        }

        .modal-btn.secondary {
            background: var(--gradient-secondary);
            color: white;
        }

        .modal-btn.danger {
            background: var(--gradient-danger);
            color: white;
        }

        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--shadow-heavy);
        }

        /* Responsive Design */
        @media (max-width: 1200px) {
            .game-container {
                flex-direction: column;
                align-items: center;
            }

            .left-sidebar, .right-sidebar {
                flex-direction: row;
                min-width: auto;
                width: 100%;
                max-width: 600px;
            }

            .piece-display, .controls-section {
                flex: 1;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }

            .game-stats {
                justify-content: center;
            }

            .stat-item {
                min-width: 100px;
                padding: 0.8rem 1rem;
            }

            .left-sidebar, .right-sidebar {
                flex-direction: column;
            }

            .game-board-container {
                padding: 1rem;
            }

            #game-canvas {
                max-width: 100%;
                height: auto;
            }

            .modal-buttons {
                flex-direction: column;
            }

            .header-controls {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .game-container {
                padding: 10px;
            }

            .game-board-container {
                padding: 0.5rem;
            }

            .piece-display, .controls-section {
                padding: 1rem;
            }

            .game-title {
                font-size: 1rem;
            }

            .stat-item {
                min-width: 80px;
                padding: 0.6rem 0.8rem;
            }

            .stat-value {
                font-size: 1rem;
            }
        }

        /* Loading Animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Particle Effects */
        .particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            animation: particleFloat 2s ease-out forwards;
        }

        @keyframes particleFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0);
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="game-header">
        <div class="header-content">
            <div>
                <h1 class="game-title">🧩 TETRIS 🧩</h1>
                <div class="game-mode" id="game-mode">Chế Độ Cổ Điển</div>
            </div>
            <div class="header-controls">
                <button class="header-btn" id="pause-btn">⏸️ Tạm Dừng</button>
                <button class="header-btn" id="settings-btn">⚙️ Cài Đặt</button>
                <button class="header-btn danger" id="quit-btn">❌ Thoát</button>
            </div>
        </div>
    </header>

    <!-- Main Game Container -->
    <main class="game-container">
        <!-- Left Sidebar - Next & Hold Pieces -->
        <aside class="left-sidebar">
            <div class="piece-display">
                <div class="piece-title">Tiếp Theo</div>
                <canvas id="next-canvas" class="piece-canvas" width="120" height="120"></canvas>
            </div>
            
            <div class="piece-display">
                <div class="piece-title">Giữ Khối</div>
                <canvas id="hold-canvas" class="piece-canvas" width="120" height="120"></canvas>
            </div>
        </aside>

        <!-- Center - Game Board -->
        <section class="game-center">
            <div class="game-stats">
                <div class="stat-item">
                    <span class="stat-label">Điểm</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Cấp</span>
                    <span class="stat-value" id="level">1</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Hàng</span>
                    <span class="stat-value" id="lines">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Thời Gian</span>
                    <span class="stat-value" id="time">00:00</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Combo</span>
                    <span class="stat-value" id="combo">0</span>
                </div>
            </div>
            
            <div class="game-board-container">
                <canvas id="game-canvas" width="300" height="600"></canvas>
            </div>
        </section>

        <!-- Right Sidebar - Controls & Instructions -->
        <aside class="right-sidebar">
            <div class="controls-section">
                <h3 class="section-title">Điều Khiển</h3>
                <div class="controls-list">
                    <div class="control-item">
                        <span class="key">← →</span>
                        <span class="action">Di chuyển</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span>
                        <span class="action">Rơi nhanh</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↑</span>
                        <span class="action">Xoay</span>
                    </div>
                    <div class="control-item">
                        <span class="key">Space</span>
                        <span class="action">Hard Drop</span>
                    </div>
                    <div class="control-item">
                        <span class="key">C</span>
                        <span class="action">Giữ khối</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span class="action">Tạm dừng</span>
                    </div>
                </div>
            </div>

            <div class="controls-section">
                <h3 class="section-title">Điều Khiển Game</h3>
                <div class="game-controls">
                    <button class="control-btn" id="pause-game-btn">⏸️ Tạm Dừng</button>
                    <button class="control-btn warning" id="restart-btn">🔄 Chơi Lại</button>
                    <button class="control-btn danger" id="quit-game-btn">❌ Thoát Game</button>
                </div>
            </div>
        </aside>
    </main>

    <!-- Modals -->
    <div id="pause-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">⏸️ Tạm Dừng</h2>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="resume-btn">Tiếp Tục</button>
                <button class="modal-btn secondary" id="restart-modal-btn">Chơi Lại</button>
                <button class="modal-btn danger" id="quit-modal-btn">Thoát</button>
            </div>
        </div>
    </div>

    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2 class="modal-title">🎮 Game Over</h2>
            <div class="modal-stats">
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-score">0</span>
                    <span class="modal-stat-label">Điểm</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-level">1</span>
                    <span class="modal-stat-label">Cấp</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-lines">0</span>
                    <span class="modal-stat-label">Hàng</span>
                </div>
                <div class="modal-stat">
                    <span class="modal-stat-value" id="final-time">00:00</span>
                    <span class="modal-stat-label">Thời Gian</span>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn primary" id="play-again-btn">Chơi Lại</button>
                <button class="modal-btn secondary" id="back-to-menu-btn">Về Menu</button>
            </div>
        </div>
    </div>

               <!-- Game Scripts -->
           <script type="module" src="tetris-game-logic.js"></script>
</body>
</html>
